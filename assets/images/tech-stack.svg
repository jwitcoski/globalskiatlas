<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 400" width="560" height="400" role="img" aria-label="Global Ski Atlas technology stack">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#64748b"/>
    </marker>
    <style>
      .stack-title { font: 600 10px 'Segoe UI', system-ui, sans-serif; fill: #0f172a; }
      .stack-sub  { font: 9px 'Segoe UI', system-ui, sans-serif; fill: #475569; }
      .row-label { font: 8px 'Segoe UI', system-ui, sans-serif; fill: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
    </style>
  </defs>
  <rect width="560" height="400" rx="12" fill="url(#bgGrad)" stroke="#cbd5e1" stroke-width="1"/>
  <title>Technology stack: OpenStreetMap, QGIS, ArcGIS Pro, Kubernetes, Docker, GeoParquet, S3, Sedona, Iceberg, GitHub, GitHub Actions, Route 53, CloudFront, API Gateway, Lambda, IAM, DynamoDB, MapLibre</title>

  <!-- Row 1: Data source + Processing -->
  <text x="280" y="14" class="row-label" text-anchor="middle">Data &amp; processing</text>
  <g transform="translate(16, 22)">
    <rect x="0" y="0" width="72" height="44" rx="6" fill="#7cb342" fill-opacity="0.2" stroke="#7cb342" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="36" y="22" class="stack-title" text-anchor="middle">OpenStreetMap</text>
    <text x="36" y="34" class="stack-sub" text-anchor="middle">data source</text>
  </g>
  <path d="M94 44 L108 44" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <g transform="translate(114, 22)">
    <rect x="0" y="0" width="92" height="44" rx="6" fill="#2c5282" fill-opacity="0.2" stroke="#2c5282" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="46" y="18" class="stack-title" text-anchor="middle">QGIS / ArcGIS Pro</text>
    <text x="46" y="34" class="stack-sub" text-anchor="middle">in Kubernetes</text>
  </g>
  <path d="M212 44 L226 44" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <g transform="translate(232, 22)">
    <rect x="0" y="0" width="64" height="44" rx="6" fill="#0ea5e9" fill-opacity="0.15" stroke="#0ea5e9" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="32" y="22" class="stack-title" text-anchor="middle">Docker</text>
    <text x="32" y="34" class="stack-sub" text-anchor="middle">stations</text>
  </g>

  <!-- Row 2: Storage -->
  <text x="280" y="92" class="row-label" text-anchor="middle">Storage</text>
  <g transform="translate(16, 100)">
    <rect x="0" y="0" width="76" height="44" rx="6" fill="#10b981" fill-opacity="0.15" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="38" y="20" class="stack-title" text-anchor="middle">GeoParquet</text>
    <text x="38" y="34" class="stack-sub" text-anchor="middle">in S3</text>
  </g>
  <path d="M98 122 L118 122" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <g transform="translate(124, 100)">
    <rect x="0" y="0" width="96" height="44" rx="6" fill="#8b5cf6" fill-opacity="0.15" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="48" y="18" class="stack-title" text-anchor="middle">Sedona</text>
    <text x="48" y="34" class="stack-title" text-anchor="middle">/ Iceberg</text>
  </g>

  <!-- Row 3: CI/CD -->
  <text x="280" y="162" class="row-label" text-anchor="middle">CI/CD</text>
  <g transform="translate(16, 170)">
    <rect x="0" y="0" width="68" height="40" rx="6" fill="#24292e" fill-opacity="0.2" stroke="#24292e" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="34" y="22" class="stack-title" text-anchor="middle">GitHub</text>
    <text x="34" y="34" class="stack-sub" text-anchor="middle">repo</text>
  </g>
  <g transform="translate(100, 170)">
    <rect x="0" y="0" width="88" height="40" rx="6" fill="#2088ff" fill-opacity="0.2" stroke="#2088ff" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="44" y="22" class="stack-title" text-anchor="middle">GitHub Actions</text>
    <text x="44" y="34" class="stack-sub" text-anchor="middle">CI/CD</text>
  </g>

  <!-- Row 4: AWS -->
  <text x="280" y="232" class="row-label" text-anchor="middle">AWS</text>
  <g transform="translate(16, 240)">
    <rect x="0" y="0" width="64" height="40" rx="6" fill="#8c4fff" fill-opacity="0.2" stroke="#8c4fff" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="32" y="22" class="stack-title" text-anchor="middle">Route 53</text>
    <text x="32" y="34" class="stack-sub" text-anchor="middle">domain</text>
  </g>
  <g transform="translate(92, 240)">
    <rect x="0" y="0" width="72" height="40" rx="6" fill="#f59e0b" fill-opacity="0.2" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="36" y="22" class="stack-title" text-anchor="middle">CloudFront</text>
    <text x="36" y="34" class="stack-sub" text-anchor="middle">CDN</text>
  </g>
  <g transform="translate(176, 240)">
    <rect x="0" y="0" width="78" height="40" rx="6" fill="#ff9900" fill-opacity="0.2" stroke="#ff9900" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="39" y="22" class="stack-title" text-anchor="middle">API Gateway</text>
    <text x="39" y="34" class="stack-sub" text-anchor="middle">→ DynamoDB</text>
  </g>
  <g transform="translate(266, 240)">
    <rect x="0" y="0" width="56" height="40" rx="6" fill="#ff9900" fill-opacity="0.2" stroke="#ff9900" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="28" y="26" class="stack-title" text-anchor="middle">Lambda</text>
  </g>
  <g transform="translate(334, 240)">
    <rect x="0" y="0" width="48" height="40" rx="6" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="24" y="26" class="stack-title" text-anchor="middle">IAM</text>
  </g>
  <g transform="translate(394, 240)">
    <rect x="0" y="0" width="72" height="40" rx="6" fill="#3b82f6" fill-opacity="0.15" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="36" y="22" class="stack-title" text-anchor="middle">DynamoDB</text>
    <text x="36" y="34" class="stack-sub" text-anchor="middle">wiki / API</text>
  </g>

  <!-- Row 5: Frontend -->
  <text x="280" y="302" class="row-label" text-anchor="middle">Frontend</text>
  <g transform="translate(16, 310)">
    <rect x="0" y="0" width="120" height="44" rx="6" fill="#2563eb" fill-opacity="0.15" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="60" y="22" class="stack-title" text-anchor="middle">MapLibre</text>
    <text x="60" y="34" class="stack-sub" text-anchor="middle">GeoParquet in browser</text>
  </g>
</svg>
