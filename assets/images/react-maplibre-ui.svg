<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 280" width="420" height="280" role="img" aria-label="Built with React and MapLibre: ski resort maps and interactive UIs">
  <defs>
    <linearGradient id="winGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f1f5f9"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <linearGradient id="mapGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2fe"/>
      <stop offset="40%" style="stop-color:#bae6fd"/>
      <stop offset="100%" style="stop-color:#7dd3fc"/>
    </linearGradient>
    <linearGradient id="snowGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#f0f9ff"/>
      <stop offset="100%" style="stop-color:#e0f2fe"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
    <filter id="winShadow" x="-4%" y="-2%" width="108%" height="104%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
    <!-- Ski run path (green = easy, blue = intermediate, black = expert) -->
    <path id="runEasy" d="M50 80 Q90 95 130 85 Q170 75 200 90" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
    <path id="runBlue" d="M70 60 Q110 85 150 75 Q190 65 220 80" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
    <path id="runExpert" d="M90 45 L120 70 L160 55 L200 65" fill="none" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>
  </defs>
  <title>React and MapLibre: ski resort maps with GeoParquet and component-based UIs</title>

  <!-- Browser window -->
  <g filter="url(#winShadow)">
    <rect x="20" y="16" width="380" height="248" rx="10" fill="url(#winGrad)" stroke="#cbd5e1" stroke-width="1.5"/>
    <rect x="20" y="16" width="380" height="32" rx="10" fill="#fff" stroke="#cbd5e1" stroke-width="1.5"/>
    <rect x="20" y="38" width="380" height="2" fill="transparent"/>
    <circle cx="38" cy="32" r="6" fill="#f87171"/>
    <circle cx="54" cy="32" r="6" fill="#fbbf24"/>
    <circle cx="70" cy="32" r="6" fill="#34d399"/>
    <rect x="88" y="26" width="180" height="12" rx="4" fill="#e2e8f0"/>
    <text x="178" y="35" font-family="Segoe UI, system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">globalskiatlas.com</text>
  </g>

  <!-- Map area (MapLibre + ski resort) -->
  <g transform="translate(32, 52)">
    <rect x="0" y="0" width="232" height="200" rx="6" fill="url(#mapGrad)" stroke="#94a3b8" stroke-width="1"/>
    <!-- Mountain silhouettes -->
    <path d="M0 200 L0 140 L35 100 L60 130 L90 85 L120 110 L160 70 L200 95 L232 80 L232 200 Z" fill="url(#snowGrad)" stroke="#94a3b8" stroke-width="0.8" opacity="0.9"/>
    <path d="M0 200 L20 155 L55 120 L85 145 L115 105 L150 135 L185 95 L220 125 L232 100 L232 200 Z" fill="#f0fdf4" stroke="#86efac" stroke-width="0.5" opacity="0.6"/>
    <!-- Ski runs (trail map style) -->
    <path d="M50 80 Q90 95 130 85 Q170 75 200 90" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <path d="M70 60 Q110 85 150 75 Q190 65 220 80" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <path d="M90 45 L120 70 L160 55 L200 65" fill="none" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
    <!-- Chairlift line -->
    <line x1="140" y1="95" x2="140" y2="55" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.7"/>
    <circle cx="140" cy="55" r="5" fill="#f59e0b" stroke="#fff" stroke-width="1"/>
    <!-- Ski marker / pin -->
    <g transform="translate(165, 75)">
      <path d="M0 -12 L4 8 L-4 8 Z" fill="#ef4444" stroke="#fff" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="2" fill="#fff"/>
    </g>
    <!-- MapLibre + GeoParquet badge -->
    <rect x="8" y="170" width="72" height="22" rx="4" fill="#1e293b"/>
    <text x="44" y="184" font-family="Segoe UI, system-ui, sans-serif" font-size="10" font-weight="600" fill="#fff" text-anchor="middle">MapLibre</text>
    <text x="88" y="184" font-family="Segoe UI, system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="start">GeoParquet</text>
  </g>

  <!-- Side panel (React – ski resort comparison) -->
  <g transform="translate(272, 52)">
    <rect x="0" y="0" width="132" height="200" rx="6" fill="url(#panelGrad)" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="0" y="0" width="132" height="28" rx="6" fill="#f1f5f9"/>
    <text x="66" y="18" font-family="Segoe UI, system-ui, sans-serif" font-size="10" font-weight="600" fill="#334155" text-anchor="middle">Compare Resorts</text>
    <!-- Resort cards -->
    <rect x="10" y="38" width="112" height="36" rx="4" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="66" y="55" font-family="Segoe UI, system-ui, sans-serif" font-size="9" font-weight="600" fill="#1e293b" text-anchor="middle">Vail • 5,289 ac</text>
    <text x="66" y="66" font-family="Segoe UI, system-ui, sans-serif" font-size="8" fill="#64748b" text-anchor="middle">195 trails</text>
    <rect x="10" y="80" width="112" height="36" rx="4" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="66" y="97" font-family="Segoe UI, system-ui, sans-serif" font-size="9" font-weight="600" fill="#1e293b" text-anchor="middle">Aspen Snowmass • 5,547 ac</text>
    <text x="66" y="108" font-family="Segoe UI, system-ui, sans-serif" font-size="8" fill="#64748b" text-anchor="middle">336 trails</text>
    <rect x="10" y="122" width="112" height="36" rx="4" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
    <text x="66" y="139" font-family="Segoe UI, system-ui, sans-serif" font-size="9" font-weight="600" fill="#1e40af" text-anchor="middle">Park City • 7,300 ac</text>
    <text x="66" y="150" font-family="Segoe UI, system-ui, sans-serif" font-size="8" fill="#3b82f6" text-anchor="middle">348 trails</text>
    <!-- React badge -->
    <rect x="8" y="168" width="56" height="24" rx="4" fill="#0ea5e9"/>
    <circle cx="28" cy="180" r="4" fill="#fff" opacity="0.3"/>
    <circle cx="36" cy="176" r="4" fill="#fff" opacity="0.5"/>
    <circle cx="44" cy="180" r="4" fill="#fff" opacity="0.3"/>
    <text x="80" y="184" font-family="Segoe UI, system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="start">components</text>
  </g>
</svg>
