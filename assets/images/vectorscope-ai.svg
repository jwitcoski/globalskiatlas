<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 280" width="420" height="280" role="img" aria-label="Vector Scope AI – Collaborative map updates, ArcGIS and GeoParquet data lakes">
  <defs>
    <linearGradient id="vsHero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A73E8"/>
      <stop offset="100%" style="stop-color:#1557b0"/>
    </linearGradient>
    <linearGradient id="vsBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f7ff"/>
      <stop offset="100%" style="stop-color:#e0edff"/>
    </linearGradient>
    <filter id="vsShadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowR" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" fill="#94a3b8"/></marker>
    <marker id="arrowL" markerWidth="8" markerHeight="8" refX="1" refY="4" orient="auto"><path d="M8 0 L0 4 L8 8 Z" fill="#94a3b8"/></marker>
  </defs>
  <title>Vector Scope AI – Collaborative map updates for agencies. VectorLedger: ArcGIS meets GeoParquet and data lakes.</title>

  <rect width="420" height="280" rx="12" fill="url(#vsBg)" stroke="#bfdbfe" stroke-width="1"/>

  <!-- Hero band -->
  <rect x="24" y="24" width="372" height="72" rx="10" fill="url(#vsHero)" stroke="#1557b0" stroke-width="1" filter="url(#vsShadow)"/>
  <text x="210" y="52" font-family="Segoe UI, system-ui, sans-serif" font-size="22" font-weight="700" fill="#fff" text-anchor="middle">VECTOR SCOPE AI</text>
  <text x="210" y="74" font-family="Segoe UI, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.95)" text-anchor="middle">Collaborative map updates for agencies</text>

  <!-- VectorLedger product line -->
  <g transform="translate(24, 108)">
    <rect x="0" y="0" width="372" height="44" rx="8" fill="#fff" stroke="#93c5fd" stroke-width="1" filter="url(#vsShadow)"/>
    <text x="186" y="18" font-family="Segoe UI, system-ui, sans-serif" font-size="14" font-weight="700" fill="#1A73E8" text-anchor="middle">VectorLedger</text>
    <text x="186" y="34" font-family="Segoe UI, system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">The missing lakehouse layer for ArcGIS</text>
  </g>

  <!-- Bridge: ArcGIS ↔ Open source -->
  <text x="210" y="172" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" fill="#334155" text-anchor="middle">ArcGIS ↔ Open-source data lakes</text>
  <g transform="translate(40, 182)">
    <rect x="0" y="0" width="88" height="36" rx="8" fill="#e8f4fc" stroke="#1A73E8" stroke-width="1"/>
    <text x="44" y="23" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" fill="#1557b0" text-anchor="middle">ArcGIS</text>
    <path d="M96 18 L128 18" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowR)"/>
    <path d="M128 18 L96 18" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowL)"/>
    <rect x="136" y="0" width="148" height="36" rx="8" fill="#f0fdf4" stroke="#10b981" stroke-width="1"/>
    <text x="210" y="14" font-family="Segoe UI, system-ui, sans-serif" font-size="9" font-weight="600" fill="#047857" text-anchor="middle">GeoParquet</text>
    <text x="210" y="26" font-family="Segoe UI, system-ui, sans-serif" font-size="9" font-weight="600" fill="#047857" text-anchor="middle">Iceberg · Sedona</text>
  </g>

  <!-- Tagline -->
  <g transform="translate(24, 232)">
    <text x="186" y="0" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#475569" text-anchor="middle">Esri web apps → versioned GeoParquet → analytics &amp; archiving</text>
    <text x="186" y="18" font-family="Segoe UI, system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">vectorscopeai.com</text>
  </g>
</svg>
