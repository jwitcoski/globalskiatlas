  <main class="tw-flex-1 tw-flex tw-place-content-center tw-place-items-center tw-px-[5%] tw-pt-4">
    <div id="msg" class="tw-max-w-2xl tw-text-gray-700">Signing you in…</div>
  </main>

  <script>
    (function () {
      function parseParams(str) {
        var p = {};
        if (!str) return p;
        str.replace(/^#?\/?/, '').split('&').forEach(function (s) {
          var kv = s.split('=');
          if (kv.length >= 2) p[decodeURIComponent(kv[0])] = decodeURIComponent(kv.slice(1).join('=').replace(/\+/g, ' '));
        });
        return p;
      }
      var hash = parseParams(window.location.hash);
      var query = parseParams(window.location.search);
      var token = hash.id_token || query.id_token || null;
      var error = hash.error || query.error || null;
      var errorDesc = hash.error_description || query.error_description || '';

      if (token) {
        sessionStorage.setItem('ywiki_id_token', token);
        try {
          var pl = JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
          sessionStorage.setItem('ywiki_user', pl.email || pl['cognito:username'] || pl.sub || '');
        } catch (e) {}
        window.location.replace(window.location.origin + '/wiki/resort.html');
        return;
      }

      var msg = document.getElementById('msg');
      if (msg) {
        if (error) {
          msg.innerHTML = '<p class="tw-mb-4"><strong>Sign-in error:</strong> ' + (errorDesc || error) + '</p>' +
            '<p class="tw-mb-4">Callback URL must be added to Cognito → App client → Allowed callback URLs:<br><code class="tw-text-sm tw-bg-gray-100 tw-px-2 tw-py-1 tw-rounded">' + window.location.origin + '/wiki/callback.html</code></p>' +
            '<p><a href="/wiki/browse.html" class="tw-text-blue-600 hover:tw-underline">Back to Atlas</a></p>';
        } else {
          msg.innerHTML = '<p class="tw-mb-4">No token received.</p>' +
            '<p class="tw-mb-4">Expected callback URL: <code class="tw-text-sm tw-bg-gray-100 tw-px-2 tw-py-1 tw-rounded">' + window.location.origin + '/wiki/callback.html</code></p>' +
            '<p><a href="/wiki/browse.html" class="tw-text-blue-600 hover:tw-underline">Back to Atlas</a></p>';
        }
      }
    })();
  </script>
  <script>
    (function() {
      var RESPONSIVE_WIDTH = 1024;
      var isHeaderCollapsed = window.innerWidth < RESPONSIVE_WIDTH;
      var collapseBtn = document.getElementById('collapse-btn');
      var collapseHeaderItems = document.getElementById('collapsed-header-items');
      function onHeaderClickOutside(e) {
        if (collapseHeaderItems && !collapseHeaderItems.contains(e.target) && !collapseBtn.contains(e.target)) {
          toggleHeader();
        }
      }
      function toggleHeader() {
        if (!collapseHeaderItems || !collapseBtn) return;
        if (isHeaderCollapsed) {
          collapseHeaderItems.classList.add('opacity-100');
          collapseHeaderItems.style.width = (window.innerWidth <= 480 ? '85vw' : '60vw');
          collapseBtn.classList.remove('bi-list');
          collapseBtn.classList.add('bi-x', 'max-lg:tw-fixed');
          isHeaderCollapsed = false;
          setTimeout(function() { window.addEventListener('click', onHeaderClickOutside); }, 1);
        } else {
          collapseHeaderItems.classList.remove('opacity-100');
          collapseHeaderItems.style.width = '0vw';
          collapseBtn.classList.remove('bi-x', 'max-lg:tw-fixed');
          collapseBtn.classList.add('bi-list');
          isHeaderCollapsed = true;
          window.removeEventListener('click', onHeaderClickOutside);
        }
      }
      function responsive() {
        if (window.innerWidth >= RESPONSIVE_WIDTH && collapseHeaderItems) {
          collapseHeaderItems.style.width = '';
        } else {
          isHeaderCollapsed = true;
        }
      }
      window.toggleHeader = toggleHeader;
      window.addEventListener('resize', responsive);
    })();
  </script>
</body>
