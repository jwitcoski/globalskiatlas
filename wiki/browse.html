    .browse-search-wrap { flex: 1 1 18rem; position: relative; }
    .browse-search-wrap svg { position: absolute; left: 0.6rem; top: 50%; transform: translateY(-50%); color: #999; pointer-events: none; }
    .browse-search { width: 100%; padding: 0.55rem 0.75rem 0.55rem 2rem; font-size: 1rem; border: 1px solid var(--resort-edit-border); border-radius: 4px; font-family: inherit; }
    .browse-search:focus { outline: none; border-color: var(--resort-subtitle-color); box-shadow: 0 0 0 2px rgba(91,143,180,0.2); }
    .browse-filter { padding: 0.55rem 0.75rem; font-size: 0.9rem; border: 1px solid var(--resort-edit-border); border-radius: 4px; font-family: inherit; background: #fff; color: var(--resort-body-color); min-width: 10rem; }
    .browse-filter:focus { outline: none; border-color: var(--resort-subtitle-color); }
    .browse-count { font-size: 0.85rem; color: var(--resort-footer-color); margin-bottom: 0.75rem; }
    .browse-results { display: grid; gap: 0.6rem; }
    .browse-card { display: flex; justify-content: space-between; align-items: center; padding: 0.7rem 1rem; border: 1px solid var(--resort-edit-border); border-radius: 6px; text-decoration: none; color: inherit; transition: border-color 0.15s, box-shadow 0.15s; gap: 1rem; }
    .browse-card:hover { border-color: var(--resort-subtitle-color); box-shadow: 0 2px 6px rgba(0,0,0,0.06); }
    .browse-card-main { min-width: 0; }
    .browse-card-title { font-weight: 600; color: var(--resort-title-color); font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .browse-card-location { font-size: 0.78rem; color: var(--resort-location-color); font-weight: 500; text-transform: uppercase; letter-spacing: 0.02em; margin-top: 0.1rem; }
    .browse-card-meta { display: flex; flex-wrap: wrap; gap: 0.5rem; flex-shrink: 0; align-items: center; }
    .browse-badge { font-size: 0.75rem; padding: 0.15rem 0.5rem; border-radius: 20px; background: var(--resort-stats-bg); color: var(--resort-stats-label); white-space: nowrap; }
    .browse-empty { color: var(--resort-footer-color); font-style: italic; padding: 2rem 0; text-align: center; }
    .browse-loading { color: var(--resort-footer-color); text-align: center; padding: 3rem 0; }
    .browse-nav { display: flex; gap: 1.5rem; align-items: center; font-size: 0.85rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--resort-edit-border); padding-bottom: 0.75rem; }
    .browse-nav a { color: var(--resort-title-color); text-decoration: none; }
    .browse-nav a:hover { text-decoration: underline; }
    .browse-nav-current { font-weight: 600; color: var(--resort-body-color); }
    @media (max-width: 768px) {
      .browse-hero h1 { font-size: 1.5rem; }
      .browse-controls { flex-direction: column; align-items: stretch; }
      .browse-search-wrap { flex: 1 1 100%; min-width: 0; }
      .browse-filter { min-width: 0; width: 100%; }
      .browse-nav { flex-wrap: wrap; gap: 0.5rem; font-size: 0.8rem; }
    }
    @media (max-width: 480px) {
      .browse-hero h1 { font-size: 1.35rem; }
      .browse-card { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
      .browse-card-title { white-space: normal; overflow: visible; text-overflow: clip; }
      .browse-card-meta { width: 100%; }
    }
  </style>

  <script>
    (function() {
      var RESPONSIVE_WIDTH = 1024;
      var isHeaderCollapsed = window.innerWidth < RESPONSIVE_WIDTH;
      var collapseBtn = document.getElementById('collapse-btn');
      var collapseHeaderItems = document.getElementById('collapsed-header-items');
      function onHeaderClickOutside(e) {
        if (collapseHeaderItems && !collapseHeaderItems.contains(e.target) && !collapseBtn.contains(e.target)) {
          toggleHeader();
        }
      }
      function toggleHeader() {
        if (!collapseHeaderItems || !collapseBtn) return;
        if (isHeaderCollapsed) {
          collapseHeaderItems.classList.add('opacity-100');
          collapseHeaderItems.style.width = (window.innerWidth <= 480 ? '85vw' : '60vw');
          collapseBtn.classList.remove('bi-list');
          collapseBtn.classList.add('bi-x', 'max-lg:tw-fixed');
          isHeaderCollapsed = false;
          setTimeout(function() { window.addEventListener('click', onHeaderClickOutside); }, 1);
        } else {
          collapseHeaderItems.classList.remove('opacity-100');
          collapseHeaderItems.style.width = '0vw';
          collapseBtn.classList.remove('bi-x', 'max-lg:tw-fixed');
          collapseBtn.classList.add('bi-list');
          isHeaderCollapsed = true;
          window.removeEventListener('click', onHeaderClickOutside);
        }
      }
      function responsive() {
        if (window.innerWidth >= RESPONSIVE_WIDTH && collapseHeaderItems) {
          collapseHeaderItems.style.width = '';
        } else {
          isHeaderCollapsed = true;
        }
      }
      window.toggleHeader = toggleHeader;
      window.addEventListener('resize', responsive);
    })();
  </script>
  <script>
    var _allPages = [];
    var _statesByCountry = {};

    function buildDropdowns(pages, bookFilter) {
      var countries = {};
      pages.forEach(function (p) {
        var pBook = p.book || '';
        if (bookFilter && bookFilter !== 'unknown' && pBook !== bookFilter) return;
        if (bookFilter === 'unknown' && (p.resortSizeCategory || (p.categorization && p.categorization.size)) !== 'unknown') return;
        if (p.country) {
          if (!countries[p.country]) countries[p.country] = {};
          if (p.state) countries[p.country][p.state] = true;
        }
      });
      _statesByCountry = countries;
      var cSel = document.getElementById('browse-country');
      var curCountry = cSel.value;
      cSel.innerHTML = '<option value="">All countries</option>';
      Object.keys(countries).sort().forEach(function (c) {
        var o = document.createElement('option'); o.value = c; o.textContent = c; cSel.appendChild(o);
      });
      if (curCountry && countries[curCountry]) cSel.value = curCountry;
      else cSel.value = '';
    }

    function updateStateDropdown(country) {
      var sSel = document.getElementById('browse-state');
      sSel.innerHTML = '<option value="">All states / provinces</option>';
      if (country && _statesByCountry[country]) {
        Object.keys(_statesByCountry[country]).sort().forEach(function (s) {
          var o = document.createElement('option'); o.value = s; o.textContent = s; sSel.appendChild(o);
        });
      }
    }

    function esc(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function slug(s) {
      if (!s || typeof s !== 'string') return '';
      return s.toLowerCase().trim().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '').replace(/-+/g, '-').replace(/^-|-$/g, '') || '';
    }

    function resortPageSlug(p) {
      if (p.pageType === 'country' || p.pageType === 'state' || p.pageType === 'continent') return p.pageId;
      var t = slug(p.title || '');
      var st = slug(p.state || '');
      var co = slug(p.country || '');
      if (st) return t ? t + '-' + st : p.pageId || '';
      if (co) return t ? t + '-' + co : p.pageId || '';
      return p.pageId || '';
    }

    function renderResults() {
      var q = (document.getElementById('browse-search').value || '').trim().toLowerCase();
      var country = document.getElementById('browse-country').value;
      var state = document.getElementById('browse-state').value;
      var book = document.getElementById('browse-book').value;
      var type = document.getElementById('browse-type').value;

      var filtered = _allPages.filter(function (p) {
        if (q && !(p.title||'').toLowerCase().includes(q) && !(p.state||'').toLowerCase().includes(q) && !(p.country||'').toLowerCase().includes(q)) return false;
        if (country && p.country !== country) return false;
        if (state && p.state !== state) return false;
        if (book === 'unknown') {
          if ((p.resortSizeCategory || (p.categorization && p.categorization.size)) !== 'unknown') return false;
        } else if (book && p.book !== book) return false;
        var cat = p.resortSizeCategory || (p.categorization && p.categorization.size);
        if (type === 'downhill' && cat === 'unknown') return false;
        if (type === 'unknown' && cat !== 'unknown') return false;
        return true;
      });

      document.getElementById('browse-count').textContent = filtered.length + ' resort' + (filtered.length !== 1 ? 's' : '');

      var container = document.getElementById('browse-results');
      if (filtered.length === 0) {
        container.innerHTML = '<div class="browse-empty">No resorts match your search.</div>';
        return;
      }

      var html = filtered.slice(0, 500).map(function (p) {
        var location = [p.state, p.country].filter(Boolean).join(', ');
        var badges = [];
        if (p.resortType) badges.push(p.resortType);
        if (p.totalLifts) badges.push(p.totalLifts + ' lifts');
        if (p.downhillTrails) badges.push(p.downhillTrails + ' trails');
        if (p.skiableTerrainAcres) badges.push(Math.round(p.skiableTerrainAcres) + ' acres');
        return '<a class="browse-card" href="/wiki/resort.html?page=' + esc(resortPageSlug(p)) + '">' +
          '<div class="browse-card-main"><div class="browse-card-title">' + esc(p.title || p.pageId) + '</div>' +
          (location ? '<div class="browse-card-location">' + esc(location) + '</div>' : '') + '</div>' +
          (badges.length ? '<div class="browse-card-meta">' + badges.map(function(b){return '<span class="browse-badge">'+esc(b)+'</span>';}).join('') + '</div>' : '') +
          '</a>';
      }).join('');

      if (filtered.length > 500) {
        html += '<div class="browse-empty" style="font-style:normal;padding:1rem 0">Showing first 500 of ' + filtered.length + ' — narrow your search to see more.</div>';
      }
      container.innerHTML = html;
    }

    document.getElementById('browse-search').addEventListener('input', renderResults);
    document.getElementById('browse-country').addEventListener('change', function () {
      updateStateDropdown(this.value);
      document.getElementById('browse-state').value = '';
      renderResults();
    });
    document.getElementById('browse-state').addEventListener('change', renderResults);
    document.getElementById('browse-book').addEventListener('change', function () {
      var book = this.value;
      buildDropdowns(_allPages, book);
      updateStateDropdown(document.getElementById('browse-country').value);
      renderResults();
    });
    document.getElementById('browse-type').addEventListener('change', renderResults);

    document.addEventListener('DOMContentLoaded', function () {
      ywikiAuth.init(function () { ywikiAuth.renderWidget('resort-auth-widget'); });
      document.getElementById('browse-search').focus();

      fetch('/api/wiki/index', { cache: 'no-store' })
        .then(function (r) {
          var ct = (r.headers.get('Content-Type') || '');
          if (!r.ok || !ct.includes('application/json')) {
            return Promise.reject(new Error(r.ok ? 'Server returned non-JSON (is /api/wiki routed to the API?)' : 'API error ' + r.status));
          }
          return r.text().then(function (text) {
            try {
              return JSON.parse(text);
            } catch (e) {
              return Promise.reject(new Error('Server returned non-JSON'));
            }
          });
        })
        .then(function (data) {
          var raw = data.pages || [];
          _allPages = raw.filter(function (p) {
            var pt = p.pageType || '';
            return pt !== 'country' && pt !== 'state' && pt !== 'continent';
          });
          document.getElementById('browse-subtitle').textContent = _allPages.length.toLocaleString() + ' resorts in the index';
          buildDropdowns(_allPages, document.getElementById('browse-book').value);
          renderResults();
        })
        .catch(function (err) {
          document.getElementById('browse-results').innerHTML = '<div class="browse-empty">Failed to load resort index. Is the server running?</div>';
          console.error(err);
        });
    });
  </script>
